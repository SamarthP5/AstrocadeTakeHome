<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrocade Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #1a1a1a;
      --panel:        #252526;
      --panel-hdr:    #2d2d30;
      --panel-hover:  #2a2d2e;
      --border:       #3c3c3c;
      --border-hi:    #505050;
      --text:         #cccccc;
      --text-dim:     #777777;
      --text-bright:  #f0f0f0;
      --accent:       #0078d4;
      --accent-dim:   rgba(0,120,212,0.15);
      --accent-hi:    #1a8fe3;
      --green:        #4ec94e;
      --green-dim:    rgba(78,201,78,0.12);
      --red:          #f14c4c;
      --red-dim:      rgba(241,76,76,0.12);
      --yellow:       #cca300;
      --yellow-dim:   rgba(204,163,0,0.12);
      --toolbar-h:    38px;
      --sb-h:         22px;
      --hier-w:       240px;
      --console-w:    360px;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ════════════════════════════════════════
       TOP TOOLBAR
    ════════════════════════════════════════ */
    #toolbar {
      height: var(--toolbar-h);
      min-height: var(--toolbar-h);
      background: var(--panel-hdr);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 6px;
      flex-shrink: 0;
      z-index: 100;
      user-select: none;
    }

    #app-logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.8px;
      color: var(--text);
      text-transform: uppercase;
      white-space: nowrap;
      min-width: 170px;
    }
    .logo-gem { color: var(--accent); font-size: 15px; }

    #transport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .t-sep { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }

    .tbtn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-dim);
      width: 30px;
      height: 26px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
    }
    .tbtn:hover { background: var(--panel-hover); border-color: var(--border); color: var(--text); }
    #play-btn.playing { color: var(--green); background: var(--green-dim); border-color: var(--green); }
    .tbtn-stop:hover  { color: var(--red); border-color: var(--red); }

    #toolbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 170px;
      justify-content: flex-end;
    }
    .stat-pill {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .stat-lbl { color: var(--text-dim); letter-spacing: 0.5px; }
    .stat-val { color: var(--text-bright); font-weight: 500; min-width: 22px; text-align: right; }

    /* ════════════════════════════════════════
       MAIN AREA
    ════════════════════════════════════════ */
    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ════════════════════════════════════════
       SHARED PANEL STYLES
    ════════════════════════════════════════ */
    .panel-hdr {
      height: 26px;
      min-height: 26px;
      background: var(--panel-hdr);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      color: var(--text-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .panel-hdr-btns { display: flex; align-items: center; gap: 3px; }
    .collapse-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 1;
      font-family: monospace;
      transition: all 0.1s;
    }
    .collapse-btn:hover { background: var(--panel-hover); color: var(--text); }

    /* Floating side-tab (shown when panel is collapsed) */
    .side-tab {
      position: absolute;
      top: 36px;
      z-index: 50;
      background: var(--panel-hdr);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 4px;
      cursor: pointer;
      writing-mode: vertical-lr;
      display: none;
      transition: all 0.1s;
    }
    .side-tab:hover { background: var(--panel-hover); color: var(--text); }
    #hierarchy-tab { left: 0; border-left: none; border-radius: 0 4px 4px 0; }
    #console-tab   { right: 0; border-right: none; border-radius: 4px 0 0 4px;
                     transform: rotate(180deg); top: 36px; }

    /* ════════════════════════════════════════
       HIERARCHY PANEL
    ════════════════════════════════════════ */
    #hierarchy-panel {
      width: var(--hier-w);
      min-width: var(--hier-w);
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow: hidden;
    }
    #hierarchy-panel.collapsed { width: 0; min-width: 0; border-right: none; }

    #hierarchy-list {
      flex: 1;
      overflow-y: auto;
      padding: 3px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .hier-empty {
      padding: 12px 14px;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }
    .hier-item {
      display: flex;
      align-items: center;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      gap: 5px;
      user-select: none;
      transition: background 0.1s;
    }
    .hier-item:hover { background: var(--panel-hover); }
    .hier-item.selected { background: var(--accent-dim); border-left: 2px solid var(--accent); padding-left: 8px; }
    .hier-item.obj-hidden .hier-name { opacity: 0.4; text-decoration: line-through; }
    .hier-icon { font-size: 10px; color: var(--text-dim); width: 13px; flex-shrink: 0; text-align: center; }
    .hier-name { flex: 1; color: var(--text); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hier-vis {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 11px;
      padding: 0 2px;
      opacity: 0;
      transition: opacity 0.1s;
      line-height: 1;
      flex-shrink: 0;
    }
    .hier-item:hover .hier-vis,
    .hier-item.obj-hidden .hier-vis { opacity: 1; }

    /* ════════════════════════════════════════
       3D VIEWPORT
    ════════════════════════════════════════ */
    #viewport {
      flex: 1;
      position: relative;
      background: #0d0d0d;
      overflow: hidden;
    }
    #viewport canvas { display: block; width: 100% !important; height: 100% !important; }

    /* Welcome overlay */
    #welcome-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,13,0.93);
      z-index: 30;
    }
    #welcome-content { text-align: center; max-width: 560px; padding: 0 24px; }
    .welcome-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .welcome-logo .logo-gem { color: var(--accent); }
    .welcome-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }
    .welcome-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .welcome-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .welcome-card:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-1px); }
    .card-icon  { font-size: 20px; margin-bottom: 4px; }
    .card-label { font-size: 12px; font-weight: 600; color: var(--text-bright); }
    .card-desc  { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

    /* Game HUD (top-left of viewport) */
    #game-hud {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 20px;
      z-index: 15;
      pointer-events: none;
      background: rgba(0,0,0,0.82);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px 22px;
    }
    .hud-item {
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 52px;
    }
    .hud-lbl { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
    .hud-item span:last-child { color: #ffffff; font-size: 24px; font-weight: 700; line-height: 1; text-shadow: 0 0 10px rgba(255,255,255,0.35); }

    /* Center HUD message */
    #hud-message {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      z-index: 15;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }
    #hud-message:not(:empty) {
      background: rgba(0,0,0,0.82);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 8px 22px;
    }

    /* Win / Lose overlay */
    #game-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 20;
      backdrop-filter: blur(6px);
    }
    #game-overlay-content {
      background: rgba(0,0,0,0.92);
      border-radius: 12px;
      text-align: center;
      padding: 52px 88px;
      border: 3px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      min-width: 360px;
    }
    #game-overlay-content.won  { border-color: var(--green); box-shadow: 0 0 60px rgba(78,201,78,0.4), inset 0 0 40px rgba(78,201,78,0.06); }
    #game-overlay-content.lost { border-color: var(--red);   box-shadow: 0 0 60px rgba(241,76,76,0.4), inset 0 0 40px rgba(241,76,76,0.06); }
    .overlay-headline {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 24px;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 0 30px currentColor;
    }
    #game-overlay-content.won  .overlay-headline { color: var(--green); }
    #game-overlay-content.lost .overlay-headline { color: var(--red); }
    .overlay-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.5px;
      line-height: 2;
    }
    .overlay-countdown {
      color: var(--accent);
      font-size: 26px;
      font-weight: 700;
      text-shadow: 0 0 12px var(--accent);
    }

    /* ════════════════════════════════════════
       CONSOLE PANEL
    ════════════════════════════════════════ */
    #console-panel {
      width: var(--console-w);
      min-width: var(--console-w);
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow: hidden;
    }
    #console-panel.collapsed { width: 0; min-width: 0; border-left: none; }

    #clr-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 1px 7px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.1s;
    }
    #clr-btn:hover { border-color: var(--red); color: var(--red); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tline {
      padding: 2px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      line-height: 1.65;
      word-break: break-word;
      display: flex;
      gap: 7px;
      align-items: baseline;
    }
    .tline .pfx {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding-top: 2px;
      border-radius: 2px;
      padding: 0 4px;
      line-height: 1.6;
    }
    .tline .txt { flex: 1; color: var(--text); }

    /* User */
    .tline.user .pfx { color: var(--text-dim); background: transparent; padding: 0; }
    .tline.user .txt { color: var(--text-bright); }

    /* AI info */
    .tline.ai .pfx { color: var(--accent); background: var(--accent-dim); }
    .tline.ai .txt { color: var(--text); }

    /* Status */
    .tline.ai.status .pfx { color: var(--yellow); background: var(--yellow-dim); }
    .tline.ai.status .txt { color: var(--text-dim); }

    /* Result */
    .tline.ai.result { background: var(--green-dim); }
    .tline.ai.result .pfx { color: var(--green); background: rgba(78,201,78,0.18); }
    .tline.ai.result .txt { color: var(--text); }

    /* Error */
    .tline.ai.error { background: var(--red-dim); }
    .tline.ai.error .pfx { color: var(--red); background: rgba(241,76,76,0.18); }
    .tline.ai.error .txt { color: #f08080; }

    /* Console suggestion chips */
    .con-suggestions {
      padding: 3px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .con-sugg {
      background: transparent;
      border: none;
      border-left: 2px solid var(--border);
      padding: 3px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      text-align: left;
      transition: all 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .con-sugg:hover { border-left-color: var(--accent); color: var(--text); background: var(--accent-dim); }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .blink { animation: blink 1s step-end infinite; }

    /* Input bar */
    #input-area {
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 5px 10px;
      background: var(--bg);
      gap: 6px;
      flex-shrink: 0;
    }
    .input-pfx {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      flex-shrink: 0;
      user-select: none;
    }
    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 4px 0;
      color: var(--text-bright);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
      caret-color: var(--accent);
    }
    #chat-input::placeholder { color: var(--text-dim); opacity: 0.55; }
    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hi); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ════════════════════════════════════════
       STATUS BAR
    ════════════════════════════════════════ */
    #status-bar {
      height: var(--sb-h);
      min-height: var(--sb-h);
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 10px;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
      transition: background 0.2s;
    }
    #status-bar.mode-play { background: #267f26; }
    .sb-left, .sb-right { display: flex; align-items: center; gap: 10px; }
    .sb-item {
      font-size: 10.5px;
      color: rgba(255,255,255,0.88);
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .sb-item strong { color: white; }
    .sb-sep { color: rgba(255,255,255,0.3); }
    #mode-label { font-weight: 700; letter-spacing: 1.2px; font-size: 11px; color: white; }

    /* Error toast */
    .error-toast {
      position: fixed;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel-hdr);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 8px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      z-index: 9999;
      border-radius: 4px;
      animation: toastIn 0.15s ease-out;
    }
    @keyframes toastIn {
      from { opacity:0; transform: translateX(-50%) translateY(-6px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    /* ════════════════════════════════════════
       PAUSED OVERLAY
    ════════════════════════════════════════ */
    #paused-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(0,0,0,0.52);
      z-index: 22;
      pointer-events: none;
      backdrop-filter: blur(2px);
    }
    #paused-overlay.visible { display: flex; }
    .paused-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 40px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 6px;
      text-shadow: 0 0 28px rgba(255,255,255,0.45);
    }
    .paused-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- ══ TOP TOOLBAR ══ -->
  <div id="toolbar">
    <div id="app-logo">
      <span class="logo-gem">◆</span>
      ASTROMINI
    </div>

    <div id="transport">
      <div class="t-sep"></div>
      <button id="play-btn" class="tbtn" onclick="togglePlay()" title="Play / Pause">▶</button>
      <button class="tbtn tbtn-stop" onclick="resetScene()" title="Stop &amp; Reset">■</button>
      <div class="t-sep"></div>
    </div>

    <div id="toolbar-right">
      <div class="stat-pill">
        <span class="stat-lbl">FPS</span>
        <span id="fps-counter" class="stat-val">60</span>
      </div>
      <div class="stat-pill">
        <span class="stat-lbl">OBJ</span>
        <span id="obj-count" class="stat-val">0</span>
      </div>
    </div>
  </div>

  <!-- ══ MAIN AREA ══ -->
  <div id="main-area">

    <!-- LEFT: HIERARCHY PANEL -->
    <div id="hierarchy-panel">
      <div class="panel-hdr">
        <span class="panel-title">Hierarchy</span>
        <button class="collapse-btn" onclick="toggleHierarchy()" title="Collapse (H)">«</button>
      </div>
      <div id="hierarchy-list">
        <div class="hier-empty">Scene is empty</div>
      </div>
    </div>
    <div id="hierarchy-tab" class="side-tab" onclick="toggleHierarchy()">HIER</div>

    <!-- CENTER: 3D VIEWPORT -->
    <div id="viewport">

      <!-- Welcome overlay (visible until first command) -->
      <div id="welcome-overlay">
        <div id="welcome-content">
          <div class="welcome-logo"><span class="logo-gem">◆</span> ASTROCADE ENGINE</div>
          <div class="welcome-sub">Describe a game or 3D scene to get started</div>
          <div class="welcome-cards">
            <button class="welcome-card" onclick="useSuggestionText('make a game where I dodge falling obstacles with arrow keys')">
              <div class="card-icon">🏃</div>
              <div class="card-label">Dodge Game</div>
              <div class="card-desc">Avoid falling obstacles using arrow keys</div>
            </button>
            <button class="welcome-card" onclick="useSuggestionText('create a collect-the-coins game with WASD movement')">
              <div class="card-icon">🪙</div>
              <div class="card-label">Coin Collector</div>
              <div class="card-desc">Move with WASD and collect all coins to win</div>
            </button>
            <button class="welcome-card" onclick="useSuggestionText('build a simple shooter where I click to destroy targets')">
              <div class="card-icon">🎯</div>
              <div class="card-label">Target Shooter</div>
              <div class="card-desc">Click to shoot and destroy colored targets</div>
            </button>
            <button class="welcome-card" onclick="useSuggestionText('make a maze I can navigate with arrow keys')">
              <div class="card-icon">🔮</div>
              <div class="card-label">Maze Explorer</div>
              <div class="card-desc">Navigate through a procedural maze</div>
            </button>
          </div>
        </div>
      </div>

      <!-- Game HUD (top-left of viewport) -->
      <div id="game-hud" style="display:none">
        <div id="hud-score-item" class="hud-item" style="display:none">
          <span class="hud-lbl">Score</span>
          <span id="hud-score">0</span>
        </div>
        <div id="hud-lives-item" class="hud-item" style="display:none">
          <span class="hud-lbl">Lives</span>
          <span id="hud-lives">0</span>
        </div>
        <div id="hud-level-item" class="hud-item" style="display:none">
          <span class="hud-lbl">Level</span>
          <span id="hud-level">0</span>
        </div>
      </div>

      <!-- Center HUD message -->
      <div id="hud-message"></div>

      <!-- Win / Lose overlay -->
      <div id="game-overlay">
        <div id="game-overlay-content"></div>
      </div>

      <!-- Paused overlay (shown when user types in console while game is active) -->
      <div id="paused-overlay">
        <div class="paused-title">PAUSED</div>
        <div class="paused-hint">Type your modification · Press Escape to resume</div>
      </div>

    </div><!-- /viewport -->

    <!-- RIGHT: CONSOLE PANEL -->
    <div id="console-panel">
      <div class="panel-hdr">
        <span class="panel-title">Console</span>
        <div class="panel-hdr-btns">
          <button id="clr-btn" onclick="resetScene()">CLR</button>
          <button class="collapse-btn" onclick="toggleConsole()" title="Collapse (Tab)">»</button>
        </div>
      </div>

      <div id="messages"></div>

      <div id="input-area">
        <span class="input-pfx">&gt;</span>
        <input type="text" id="chat-input" placeholder="Describe your scene or game..." autocomplete="off" />
        <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">↵</button>
      </div>
    </div>
    <div id="console-tab" class="side-tab" onclick="toggleConsole()">CON</div>

  </div><!-- /main-area -->

  <!-- ══ STATUS BAR ══ -->
  <div id="status-bar">
    <div class="sb-left">
      <span class="sb-item"><span id="mode-label">EDIT</span></span>
      <span class="sb-sep">|</span>
      <span class="sb-item">Objects: <strong id="status-obj-count">0</strong></span>
    </div>
    <div class="sb-right">
      <span class="sb-item">Powered by Gemini 2.5 Flash</span>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // Three.js Scene Setup
    // ═══════════════════════════════════════════════════════════

    let scene, camera, renderer, controls;
    let _ground = null, _grid = null;
    let objects = new Map();
    let isPlaying = false;
    let clock = new THREE.Clock();
    let frameCount = 0;
    let lastFpsUpdate = 0;

    function initScene() {
      const viewport = document.getElementById('viewport');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);
      scene.fog = new THREE.Fog(0x87ceeb, 50, 150);

      camera = new THREE.PerspectiveCamera(60, viewport.clientWidth / viewport.clientHeight, 0.1, 1000);
      camera.position.set(8, 6, 12);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(viewport.clientWidth, viewport.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      viewport.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 3;
      controls.maxDistance = 100;
      controls.maxPolarAngle = Math.PI / 2.05;

      const groundGeo = new THREE.PlaneGeometry(200, 200);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.8 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);
      _ground = ground;

      const grid = new THREE.GridHelper(200, 100, 0x3d8b40, 0x3d8b40);
      grid.material.opacity = 0.15;
      grid.material.transparent = true;
      scene.add(grid);
      _grid = grid;

      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      const directional = new THREE.DirectionalLight(0xffffff, 1.0);
      directional.position.set(10, 20, 10);
      directional.castShadow = true;
      directional.shadow.mapSize.width = 2048;
      directional.shadow.mapSize.height = 2048;
      directional.shadow.camera.near = 0.5;
      directional.shadow.camera.far = 100;
      directional.shadow.camera.left = -30;
      directional.shadow.camera.right = 30;
      directional.shadow.camera.top = 30;
      directional.shadow.camera.bottom = -30;
      scene.add(directional);

      const hemi = new THREE.HemisphereLight(0x87ceeb, 0x4caf50, 0.3);
      scene.add(hemi);

      window.addEventListener('resize', () => {
        camera.aspect = viewport.clientWidth / viewport.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(viewport.clientWidth, viewport.clientHeight);
      });

      initMouseTracking(viewport);
      animate();
    }

    // ═══════════════════════════════════════════════════════════
    // Game Infrastructure
    // ═══════════════════════════════════════════════════════════

    const keys = new Set();
    window.addEventListener('keydown', (e) => {
      const chatInput = document.getElementById('chat-input');
      const inputFocused = document.activeElement === chatInput;

      // Escape: toggle between game focus and chat focus
      if (e.key === 'Escape') {
        e.preventDefault();
        if (onGameUpdate) {
          if (inputFocused) {
            chatInput.blur();
            document.body.focus();
          } else {
            chatInput.focus();
          }
        }
        return;
      }

      // UI keyboard shortcuts — only when not in a game and not typing
      if (!inputFocused && !onGameUpdate) {
        if (e.key === 'Tab') { e.preventDefault(); toggleConsole(); return; }
        if (e.key === 'h' || e.key === 'H') { toggleHierarchy(); return; }
      }

      // Only track keys for the game when chat input is not focused
      if (!inputFocused) keys.add(e.key);

      // When a game loop is active and chat input is not focused, prevent default on all keys
      if (onGameUpdate && !inputFocused) {
        e.preventDefault();
        // Blur focused buttons so spacebar doesn't re-trigger them
        if (e.key === ' ' && document.activeElement.tagName === 'BUTTON') {
          document.activeElement.blur();
        }
        return;
      }

      // Outside a game: still block arrow keys / space from scrolling unless typing
      if (!onGameUpdate && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key) && !inputFocused) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => keys.delete(e.key));

    // mouse.clicked   — true while button is held (polled each frame)
    // mouse.justClicked — true for exactly ONE frame after a click, then auto-resets at end of animate()
    const mouse = { x: 0, y: 0, clicked: false, justClicked: false };
    function initMouseTracking(vp) {
      vp.addEventListener('mousemove', (e) => {
        const r = vp.getBoundingClientRect();
        mouse.x = ((e.clientX - r.left) / r.width)  *  2 - 1;
        mouse.y = ((e.clientY - r.top)  / r.height) * -2 + 1;
      });
      vp.addEventListener('mousedown', () => {
        mouse.clicked = true;
        mouse.justClicked = true;
        // Blur chat input when clicking the viewport during a game so keyboard goes to game
        if (onGameUpdate) {
          const chatInput = document.getElementById('chat-input');
          if (chatInput && document.activeElement === chatInput) chatInput.blur();
        }
      });
      vp.addEventListener('mouseup',   () => { mouse.clicked = false; });
    }

    // Pre-built raycaster for game code — call inside setGameUpdate to detect mesh clicks
    function raycastClick(clickableObjects) {
      if (!mouse.justClicked || !clickableObjects || !clickableObjects.length) return null;
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(mouse.x, mouse.y), camera);
      const hits = raycaster.intersectObjects(clickableObjects, true);
      return hits.length > 0 ? hits[0] : null;
    }

    const scoreBoard = { score: 0, lives: 0, level: 0, message: '', _used: new Set() };
    const gameVars   = {};   // shared mutable state — game loop reads, modification code writes
    let gameState        = 'playing';
    let gameOverHandled  = false;
    let onGameUpdate     = null;
    let gamePaused       = false;
    let elapsedTime      = 0;
    let autoResetTimer    = null;
    let countdownInterval = null;

    // ── HUD setter functions — set value AND mark field as used ──
    function setScore(val)   { scoreBoard.score = val;   scoreBoard._used.add('score'); }
    function setLives(val)   { scoreBoard.lives = val;   scoreBoard._used.add('lives'); }
    function setLevel(val)   { scoreBoard.level = val;   scoreBoard._used.add('level'); }
    function setMessage(val) { scoreBoard.message = val; }

    // ── Timer helper ──
    function createTimer(seconds, onTick, onEnd) {
      let remaining = seconds;
      return function(delta) {
        remaining -= delta;
        const ceiled = Math.ceil(Math.max(0, remaining));
        if (onTick) onTick(ceiled);
        if (remaining <= 0) {
          if (onEnd) onEnd();
          return true;
        }
        return false;
      };
    }

    // ── Score feedback helper ──
    function showScoreFeedback(text, duration) {
      duration = (duration !== undefined) ? duration : 1.0;
      setMessage(text);
      setTimeout(function() {
        if (scoreBoard.message === text) setMessage('');
      }, duration * 1000);
    }

    // ── Paused overlay helpers ──
    function showPausedOverlay() {
      const el = document.getElementById('paused-overlay');
      if (el) el.classList.add('visible');
      _syncPlayState();
    }
    function hidePausedOverlay() {
      const el = document.getElementById('paused-overlay');
      if (el) el.classList.remove('visible');
      _syncPlayState();
    }

    function collides(a, b, threshold) {
      if (!a || !b) return false;
      a.updateMatrixWorld(true);
      b.updateMatrixWorld(true);
      const box1 = new THREE.Box3().setFromObject(a);
      const box2 = new THREE.Box3().setFromObject(b);
      if (threshold) box1.expandByScalar(threshold);
      return box1.intersectsBox(box2);
    }

    function distanceTo(a, b) {
      if (!a || !b) return Infinity;
      return a.position.distanceTo(b.position);
    }

    function isNear(a, b, radius) {
      if (!a || !b) return false;
      return a.position.distanceTo(b.position) < (radius !== undefined ? radius : 1.5);
    }

    // ── Collectibles system ──
    const collectibles = [];

    function spawnCollectible(name, mesh, onCollect) {
      mesh.userData.collectibleName = name;
      mesh.userData.onCollect = onCollect;
      mesh.userData.collected = false;
      scene.add(mesh);
      objects.set(name, mesh);
      collectibles.push(mesh);
      return mesh;
    }

    function checkCollectibles(player, radius) {
      if (!player) return;
      const r = (radius !== undefined) ? radius : 1.5;
      for (let i = collectibles.length - 1; i >= 0; i--) {
        const item = collectibles[i];
        if (item.userData.collected) continue;
        if (!item.parent) { collectibles.splice(i, 1); continue; }
        if (player.position.distanceTo(item.position) < r) {
          item.userData.collected = true;
          if (item.userData.onCollect) item.userData.onCollect(item);
          scene.remove(item);
          if (item.geometry) item.geometry.dispose();
          if (item.material) {
            if (Array.isArray(item.material)) item.material.forEach(m => m.dispose());
            else item.material.dispose();
          }
          objects.delete(item.userData.collectibleName);
          collectibles.splice(i, 1);
        }
      }
    }

    // ── Camera lock system ──
    let cameraLocked = false;

    function lockCamera(position, lookAt) {
      camera.position.copy(position);
      camera.lookAt(lookAt instanceof THREE.Vector3 ? lookAt : new THREE.Vector3(...lookAt));
      if (controls) {
        const target = lookAt instanceof THREE.Vector3 ? lookAt : new THREE.Vector3(...lookAt);
        controls.target.copy(target);
        controls.enabled = false;
      }
      cameraLocked = true;
    }

    function unlockCamera() {
      cameraLocked = false;
      if (controls) controls.enabled = true;
    }

    // ── Closure wrappers so generated code (running in global new Function() scope) ──
    // ── can set these script-scoped `let` variables via closure, not window.* ──
    function setGameUpdate(fn) { onGameUpdate = fn; }
    function setGameState(state) { gameState = state; }

    // ── removeObject: properly removes a named object from both scene and objects Map ──
    function removeObject(name) {
      const obj = objects.get(name);
      if (obj) {
        scene.remove(obj);
        obj.traverse((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach(m => m.dispose());
            } else {
              child.material.dispose();
            }
          }
        });
        objects.delete(name);
      }
    }

    // ── fullSceneWipe: clears tracked objects AND any untracked meshes (bullets, particles, etc.) ──
    function fullSceneWipe() {
      // Dispose and remove all tracked objects
      objects.forEach((obj) => {
        scene.remove(obj);
        obj.traverse((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
          }
        });
      });
      objects.clear();

      // Remove any untracked meshes left in the scene (bullets, particles, dynamically spawned enemies, etc.)
      const toRemove = [];
      scene.traverse((child) => {
        if (child.isMesh && child !== _ground && child !== _grid) {
          toRemove.push(child);
        }
      });
      toRemove.forEach((obj) => {
        scene.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      });
    }

    // ── Auto-reset helpers ──
    function clearAutoReset() {
      if (autoResetTimer)    { clearTimeout(autoResetTimer);    autoResetTimer = null; }
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    }

    function autoResetGame() {
      fullSceneWipe();

      isPlaying = false;
      _syncPlayState();

      onGameUpdate    = null;
      gamePaused      = false;
      gameState       = 'playing';
      gameOverHandled = false;
      elapsedTime     = 0;
      keys.clear();
      mouse.clicked   = false;
      scoreBoard.score = 0; scoreBoard.lives = 0; scoreBoard.level = 0; scoreBoard.message = '';
      scoreBoard._used.clear();
      for (const k in gameVars) delete gameVars[k];
      collectibles.length = 0;
      hidePausedOverlay();
      updateScoreBoardUI();
      document.getElementById('hud-message').textContent = '';
      document.getElementById('game-overlay').style.display = 'none';

      cameraLocked = false;
      camera.position.set(8, 6, 12);
      camera.lookAt(0, 0, 0);
      if (controls) { controls.target.set(0, 0, 0); controls.enabled = true; }

      selectedObjectName = null;
      updateObjectCount();
    }

    // ── HUD helpers ──
    function updateScoreBoardUI() {
      const hud       = document.getElementById('game-hud');
      const scoreItem = document.getElementById('hud-score-item');
      const livesItem = document.getElementById('hud-lives-item');
      const levelItem = document.getElementById('hud-level-item');
      // Show the HUD container only when a game is playing
      if (hud) hud.style.display = isPlaying ? 'flex' : 'none';
      // Score: always visible when game is running
      if (scoreItem) scoreItem.style.display = isPlaying ? '' : 'none';
      // Lives / Level: only visible if the game explicitly called setLives() / setLevel()
      if (livesItem) livesItem.style.display = scoreBoard._used.has('lives') ? '' : 'none';
      if (levelItem) levelItem.style.display = scoreBoard._used.has('level') ? '' : 'none';
      document.getElementById('hud-score').textContent   = scoreBoard.score;
      document.getElementById('hud-lives').textContent   = scoreBoard.lives;
      document.getElementById('hud-level').textContent   = scoreBoard.level;
      document.getElementById('hud-message').textContent = scoreBoard.message;
    }

    function handleGameStateUI() {
      if (gameOverHandled) return;
      const overlay = document.getElementById('game-overlay');
      const content = document.getElementById('game-overlay-content');

      function startCountdown(finalScore) {
        let remaining = 3;
        const updateSub = () => {
          const sub = content.querySelector('.overlay-sub');
          if (sub) sub.innerHTML = `Score: ${finalScore} &nbsp;&middot;&nbsp; Resetting in <span class="overlay-countdown">${remaining}</span>`;
        };
        updateSub();
        clearAutoReset();
        countdownInterval = setInterval(() => {
          remaining--;
          if (remaining > 0) {
            updateSub();
          } else {
            clearAutoReset();
            autoResetGame();
          }
        }, 1000);
      }

      if (gameState === 'won') {
        gameOverHandled = true;
        content.className = 'won';
        content.innerHTML = `
          <div class="overlay-headline">Game Complete</div>
          <div class="overlay-sub"></div>`;
        overlay.style.display = 'flex';
        isPlaying = false;
        _syncPlayState();
        startCountdown(scoreBoard.score);
      } else if (gameState === 'lost') {
        gameOverHandled = true;
        content.className = 'lost';
        content.innerHTML = `
          <div class="overlay-headline">Game Over</div>
          <div class="overlay-sub"></div>`;
        overlay.style.display = 'flex';
        isPlaying = false;
        _syncPlayState();
        startCountdown(scoreBoard.score);
      }
    }

    // ═══════════════════════════════════════════════════════════
    // Animation Loop
    // ═══════════════════════════════════════════════════════════

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);

      // Disable orbit controls while a game loop is active or camera is locked
      controls.enabled = !cameraLocked && !(isPlaying && typeof onGameUpdate === 'function');
      controls.update();

      if (isPlaying && !gamePaused) {
        elapsedTime += delta;

        objects.forEach((obj) => {
          if (obj.userData && typeof obj.userData.update === 'function') {
            obj.userData.update(delta);
          }
        });

        if (typeof onGameUpdate === 'function') {
          onGameUpdate(delta, elapsedTime);
        }

        updateScoreBoardUI();

        if (gameState === 'won' || gameState === 'lost') {
          handleGameStateUI();
        }
      }

      renderer.render(scene, camera);

      // Reset one-frame click flag AFTER all game logic has had a chance to read it
      mouse.justClicked = false;

      frameCount++;
      const now = performance.now();
      if (now - lastFpsUpdate >= 1000) {
        document.getElementById('fps-counter').textContent = frameCount;
        frameCount = 0;
        lastFpsUpdate = now;
      }
    }

    // ═══════════════════════════════════════════════════════════
    // Play State
    // ═══════════════════════════════════════════════════════════

    function _syncPlayState() {
      const btn = document.getElementById('play-btn');
      const sb  = document.getElementById('status-bar');
      const ml  = document.getElementById('mode-label');
      if (isPlaying && gamePaused && onGameUpdate) {
        btn.classList.add('playing');
        btn.innerHTML = '⏸';
        btn.title = 'Paused — typing in console';
        sb.classList.add('mode-play');
        ml.textContent = 'PAUSED';
      } else if (isPlaying) {
        btn.classList.add('playing');
        btn.innerHTML = '⏸';
        btn.title = 'Pause';
        sb.classList.add('mode-play');
        ml.textContent = 'PLAY';
      } else {
        btn.classList.remove('playing');
        btn.innerHTML = '▶';
        btn.title = 'Play / Pause (Space)';
        sb.classList.remove('mode-play');
        ml.textContent = 'EDIT';
      }
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      _syncPlayState();
    }

    // ═══════════════════════════════════════════════════════════
    // Hierarchy Panel
    // ═══════════════════════════════════════════════════════════

    let selectedObjectName = null;

    function getObjectIcon(obj) {
      if (!obj) return '◇';
      if (obj.isGroup) return '⊕';
      if (obj.isLight) return '◎';
      if (obj.isMesh) {
        if (obj.geometry && (obj.geometry.type === 'SphereGeometry' ||
            obj.geometry.type === 'SphereBufferGeometry')) return '●';
        return '■';
      }
      return '◇';
    }

    function selectObject(name) {
      // Remove emissive highlight from previous selection
      if (selectedObjectName) {
        const prev = objects.get(selectedObjectName);
        if (prev && prev.material) {
          const mats = Array.isArray(prev.material) ? prev.material : [prev.material];
          mats.forEach(m => { try { if (m.emissive) m.emissive.set(0x000000); } catch(e) {} });
        }
      }
      // Toggle deselect
      if (selectedObjectName === name) {
        selectedObjectName = null;
        updateHierarchy();
        return;
      }
      selectedObjectName = name;
      const obj = objects.get(name);
      if (obj && obj.material) {
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach(m => { try { if (m.emissive) m.emissive.set(0x1a4a7a); } catch(e) {} });
      }
      updateHierarchy();
    }

    function toggleObjectVisibility(name, e) {
      e.stopPropagation();
      const obj = objects.get(name);
      if (obj) {
        obj.visible = !obj.visible;
        updateHierarchy();
      }
    }

    function updateHierarchy() {
      const listEl = document.getElementById('hierarchy-list');
      if (objects.size === 0) {
        listEl.innerHTML = '<div class="hier-empty">Scene is empty</div>';
        return;
      }
      listEl.innerHTML = '';
      objects.forEach((obj, name) => {
        const item = document.createElement('div');
        item.className = [
          'hier-item',
          !obj.visible ? 'obj-hidden' : '',
          name === selectedObjectName ? 'selected' : ''
        ].filter(Boolean).join(' ');
        item.dataset.name = name;
        item.onclick = () => selectObject(name);

        const icon = document.createElement('span');
        icon.className = 'hier-icon';
        icon.textContent = getObjectIcon(obj);

        const nameEl = document.createElement('span');
        nameEl.className = 'hier-name';
        nameEl.textContent = name;
        nameEl.title = name;

        const visBtn = document.createElement('button');
        visBtn.className = 'hier-vis';
        visBtn.textContent = obj.visible ? '👁' : '🚫';
        visBtn.title = obj.visible ? 'Hide' : 'Show';
        visBtn.onclick = (e) => toggleObjectVisibility(name, e);

        item.appendChild(icon);
        item.appendChild(nameEl);
        item.appendChild(visBtn);
        listEl.appendChild(item);
      });
    }

    function toggleHierarchy() {
      const panel = document.getElementById('hierarchy-panel');
      const tab   = document.getElementById('hierarchy-tab');
      const collapsed = panel.classList.toggle('collapsed');
      tab.style.display = collapsed ? 'block' : 'none';
    }

    // ═══════════════════════════════════════════════════════════
    // Console Panel
    // ═══════════════════════════════════════════════════════════

    function toggleConsole() {
      const panel = document.getElementById('console-panel');
      const tab   = document.getElementById('console-tab');
      const collapsed = panel.classList.toggle('collapsed');
      tab.style.display = collapsed ? 'block' : 'none';
    }

    // ═══════════════════════════════════════════════════════════
    // Object Count
    // ═══════════════════════════════════════════════════════════

    function updateObjectCount() {
      const n = objects.size;
      document.getElementById('obj-count').textContent = n;
      const sb = document.getElementById('status-obj-count');
      if (sb) sb.textContent = n;
      updateHierarchy();
    }

    // ═══════════════════════════════════════════════════════════
    // Chat / Console System
    // ═══════════════════════════════════════════════════════════

    const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
    let isProcessing = false;
    let retryCount   = 0;

    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('chat-input');
    const sendBtn    = document.getElementById('send-btn');

    const SUGGESTIONS = [
      'make a game where I dodge falling obstacles with arrow keys',
      'create a collect-the-coins game with WASD movement',
      'build a simple shooter where I click to destroy targets',
      'make a maze I can navigate with arrow keys',
    ];

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // When chat input gains focus while a game is active, pause the game
    inputEl.addEventListener('focus', () => {
      if (onGameUpdate) {
        gamePaused = true;
        keys.clear();
        showPausedOverlay();
      }
    });
    // When chat input loses focus, unpause the game
    inputEl.addEventListener('blur', () => {
      if (gamePaused) {
        gamePaused = false;
        hidePausedOverlay();
      }
    });

    function useSuggestionText(text) {
      inputEl.value = text;
      inputEl.focus();
      sendMessage();
    }

    function useSuggestion(el) {
      inputEl.value = el.textContent.replace(/^\[\d+\]\s+/, '');
      sendMessage();
    }

    function addInitialConsoleMessages() {
      const sugDiv = document.createElement('div');
      sugDiv.className = 'con-suggestions';
      sugDiv.id = 'con-suggestions';
      SUGGESTIONS.forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'con-sugg';
        btn.textContent = `[${i + 1}]  ${text}`;
        btn.onclick = () => useSuggestion(btn);
        sugDiv.appendChild(btn);
      });
      messagesEl.appendChild(sugDiv);
    }

    function clearBoot() {
      // Hide viewport welcome overlay on first message
      const welcome = document.getElementById('welcome-overlay');
      if (welcome) welcome.style.display = 'none';
      // Remove console suggestion chips
      const sugg = document.getElementById('con-suggestions');
      if (sugg) sugg.remove();
    }

    function getPrefix(type, extraClass) {
      if (type === 'user')         return '>';
      if (extraClass === 'error')  return '[error]';
      if (extraClass === 'result') return '[info]';
      if (extraClass === 'status') return '[sys]';
      return '[info]';
    }

    function typeWrite(el, text) {
      const maxMs = 700;
      const delay = Math.max(4, Math.min(22, maxMs / text.length));
      let i = 0;
      const tick = setInterval(() => {
        el.textContent = text.slice(0, ++i);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        if (i >= text.length) clearInterval(tick);
      }, delay);
    }

    function addMessage(type, content, extraClass = '') {
      clearBoot();
      const line = document.createElement('div');
      line.className = ['tline', type, extraClass].filter(Boolean).join(' ');

      const pfx = document.createElement('span');
      pfx.className = 'pfx';
      pfx.textContent = getPrefix(type, extraClass);

      const txt = document.createElement('span');
      txt.className = 'txt';

      line.appendChild(pfx);
      line.appendChild(txt);
      messagesEl.appendChild(line);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      typeWrite(txt, content);
      return line;
    }

    function addTypingIndicator() {
      const line = document.createElement('div');
      line.className = 'tline ai status';
      line.id = 'typing';
      line.innerHTML = '<span class="pfx">[sys]</span><span class="txt">processing<span class="blink">_</span></span>';
      messagesEl.appendChild(line);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // ═══════════════════════════════════════════════════════════
    // Code Execution with Auto-Retry
    // ═══════════════════════════════════════════════════════════

    async function runGeneratedCode(code, description, isModification) {
      isModification = isModification === true;
      clearAutoReset();

      if (!isModification) {
        // Fresh game/scene: wipe everything and reset all state
        fullSceneWipe();
        onGameUpdate     = null;
        gameState        = 'playing';
        gameOverHandled  = false;
        elapsedTime      = 0;
        keys.clear();
        mouse.clicked    = false;
        mouse.justClicked = false;
        scoreBoard.score = 0; scoreBoard.lives = 0; scoreBoard.level = 0; scoreBoard.message = '';
        scoreBoard._used.clear();
        for (const k in gameVars) delete gameVars[k];
        collectibles.length = 0;
        updateScoreBoardUI();
        document.getElementById('hud-message').textContent = '';
        document.getElementById('game-overlay').style.display = 'none';
        unlockCamera();
      } else {
        // Modification: preserve game state — just reset per-frame input state
        keys.clear();
        mouse.clicked    = false;
        mouse.justClicked = false;
        gameOverHandled  = false;
        document.getElementById('game-overlay').style.display = 'none';
      }

      try {
        const fn = new Function(
          'scene','THREE','camera','renderer','objects',
          'keys','mouse','scoreBoard','collides',
          'setGameUpdate','setGameState',
          'raycastClick','lockCamera','unlockCamera','removeObject',
          'setScore','setLives','setLevel','setMessage',
          'createTimer','showScoreFeedback',
          'gameVars','modifyGame',
          'isNear','distanceTo',
          'spawnCollectible','checkCollectibles','collectibles',
          code
        );
        fn(scene, THREE, camera, renderer, objects,
           keys, mouse, scoreBoard, collides,
           setGameUpdate, setGameState,
           raycastClick, lockCamera, unlockCamera, removeObject,
           setScore, setLives, setLevel, setMessage,
           createTimer, showScoreFeedback,
           gameVars, isModification,
           isNear, distanceTo,
           spawnCollectible, checkCollectibles, collectibles);
        updateObjectCount();
        addMessage('ai', description, 'result');
        if (!isPlaying) {
          isPlaying = true;
          _syncPlayState();
        }
        // Unpause and return focus to game if a game loop is now active
        if (onGameUpdate) {
          gamePaused = false;
          hidePausedOverlay();
          const chatInput = document.getElementById('chat-input');
          if (chatInput) { chatInput.blur(); document.body.focus(); }
          addMessage('ai', 'Game active — click viewport to play · press Escape to type', 'status');
        }
      } catch (execError) {
        console.error('[exec] runtime error:', execError.message);
        console.error('[exec] generated code:\n', code);

        if (retryCount === 0) {
          retryCount++;
          addMessage('ai', 'runtime error detected — requesting auto-fix...', 'status');
          try {
            const fixMsg = `The code you generated threw this runtime error: "${execError.message}". Please regenerate the complete, self-contained code and fix the issue. Ensure every object is created inside this code block before being used, null-check all objects.get() results, and never call methods on potentially undefined values.`;
            const retryRes = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: fixMsg, sessionId }),
            });
            const retryData = await retryRes.json();
            if (retryData.code) {
              addMessage('ai', 're-running with fixed code...', 'status');
              await runGeneratedCode(retryData.code, retryData.description, isModification);
            } else {
              addMessage('ai', retryData.description || 'Auto-fix returned no code — please try rephrasing your request.', 'error');
            }
          } catch (retryErr) {
            console.error('[retry] error:', retryErr);
            addMessage('ai', `auto-fix failed: ${retryErr.message}`, 'error');
          }
        } else {
          addMessage('ai', `exec error: ${execError.message}`, 'error');
        }
      }
    }

    // ═══════════════════════════════════════════════════════════
    // Send Message
    // ═══════════════════════════════════════════════════════════

    async function sendMessage() {
      let message = inputEl.value.trim();
      if (!message || isProcessing) return;

      retryCount = 0;
      // Capture modification context before async work — true if user typed while a game was running
      const wasModifyingGame = gamePaused && onGameUpdate !== null;

      // Resolve a bare number to its suggestion text
      const numOnly = /^(\d+)$/.exec(message);
      if (numOnly) {
        const idx = parseInt(numOnly[1], 10) - 1;
        if (idx >= 0 && idx < SUGGESTIONS.length) {
          message = SUGGESTIONS[idx];
        }
      }

      isProcessing = true;
      sendBtn.disabled = true;
      inputEl.value = '';

      addMessage('user', message);
      addTypingIndicator();

      // ── Step 1: Validate ──
      try {
        const vRes = await fetch('/api/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        if (vRes.ok) {
          const v = await vRes.json();
          if (!v.valid) {
            removeTypingIndicator();
            addMessage('ai', v.reason || 'That doesn\'t look like a scene or game command. Try something like "make a red cube" or "build a shooter game".', 'error');
            isProcessing = false;
            sendBtn.disabled = false;
            inputEl.focus();
            return;
          }
        }
      } catch (e) {
        console.warn('Validation skipped:', e.message);
      }

      // ── Step 2: Generate ──
      try {
        // Describe current scene state so the LLM can handle follow-up/modification requests
        const sceneContext = Array.from(objects.entries()).map(([name, obj]) => {
          const type = (obj.geometry && obj.geometry.type) || obj.type || 'Object3D';
          return `"${name}" (${type} at ${obj.position.x.toFixed(1)},${obj.position.y.toFixed(1)},${obj.position.z.toFixed(1)})`;
        }).join(', ');
        const gameVarsStr = Object.keys(gameVars).length > 0 ? JSON.stringify(gameVars) : 'none';
        const context = `Current scene objects: [${sceneContext || 'empty'}]. Game loop active: ${onGameUpdate !== null}. Game state: ${gameState}. Score: ${scoreBoard.score}. Current gameVars: ${gameVarsStr}.${wasModifyingGame ? ' User is requesting a MODIFICATION to the running game — update gameVars values and/or add/remove objects. Only call setGameUpdate() if the mechanic fundamentally changes. Do NOT rebuild the game from scratch.' : ''}`;

        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId, context }),
        });

        removeTypingIndicator();

        const ct = response.headers.get('content-type');
        if (!ct || !ct.includes('application/json')) {
          throw new Error('unexpected server response — is the server running?');
        }

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'request failed');

        addMessage('ai', 'building scene...', 'status');

        if (data.code) {
          await runGeneratedCode(data.code, data.description, wasModifyingGame);
        } else {
          addMessage('ai', data.description);
        }

      } catch (error) {
        removeTypingIndicator();
        console.error('Chat error:', error);
        addMessage('ai', `error: ${error.message}`, 'error');
        if (error.message.includes('GEMINI_API_KEY')) {
          showToast('GEMINI_API_KEY not set in .env');
        }
      }

      isProcessing = false;
      sendBtn.disabled = false;
      // Don't steal focus back to the chat input if a game is running — keys need to reach the game
      if (!onGameUpdate) {
        inputEl.focus();
      }
    }

    // ═══════════════════════════════════════════════════════════
    // Reset Scene
    // ═══════════════════════════════════════════════════════════

    async function resetScene() {
      // Full scene wipe: removes tracked and untracked objects
      fullSceneWipe();

      // Reset play state
      isPlaying = false;
      _syncPlayState();

      // Reset game infrastructure
      clearAutoReset();
      onGameUpdate     = null;
      gamePaused       = false;
      gameState        = 'playing';
      gameOverHandled  = false;
      elapsedTime      = 0;
      keys.clear();
      mouse.clicked    = false;
      scoreBoard.score  = 0;
      scoreBoard.lives  = 0;
      scoreBoard.level  = 0;
      scoreBoard.message = '';
      scoreBoard._used.clear();
      for (const k in gameVars) delete gameVars[k];
      collectibles.length = 0;
      hidePausedOverlay();
      updateScoreBoardUI();
      document.getElementById('hud-message').textContent = '';
      document.getElementById('game-overlay').style.display = 'none';

      // Unlock camera and restore default position
      cameraLocked = false;
      camera.position.set(8, 6, 12);
      camera.lookAt(0, 0, 0);
      if (controls) { controls.target.set(0, 0, 0); controls.enabled = true; }

      // Clear selection
      selectedObjectName = null;
      updateObjectCount();

      // Show welcome overlay again
      const welcome = document.getElementById('welcome-overlay');
      if (welcome) welcome.style.display = 'flex';

      // Clear console and show suggestions again
      messagesEl.innerHTML = '';
      addInitialConsoleMessages();

      await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'error-toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    // ═══════════════════════════════════════════════════════════
    // Init
    // ═══════════════════════════════════════════════════════════
    initScene();
    addInitialConsoleMessages();
  </script>
</body>
